<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UI Annotator Alpine example</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main x-data="{ count: 0 }">
      <h1>Alpine counter</h1>
      <button data-testid="increment-button" x-on:click="count++">Increment</button>
      <p>Count: <span x-text="count"></span></p>
    </main>

    <script src="../../dist/agentation-vanilla.global.js"></script>
    <script>
      window.AgentationVanilla.createAnnotator({ enabled: true }).mount();
    </script>
  </body>
</html>
